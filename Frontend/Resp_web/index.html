<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tóparti Horgásztúra</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Tóparti Horgásztúra</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="#">Kezdőlap</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Haltípusok</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Létrehozás</a></li>
                </ul>
            </div>
        </div>

    <main class="container mt-2">
        
        <div class="row justify-content-center">
            
            <div class="col-12 col-md-6 col-lg-4 mb-3">
                <div class="card h-100">
                    <img src="" class="card-img-top" alt="Elso kep neve" title="Elso kep neve">
                    <div class="card-body">
                        <p class="card-text">Cím: Csónakos túra

Szöveg: Fedezd fel a tó csendes zugait csónakkal!</p>
                        <a href="#" class="btn btn-primary">Megjelenítés</a>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4 mb-3">
                <div class="card h-100">
                    <img src="kep2.jpg" class="card-img-top" alt="Masodik kep neve" title="Masodik kep neve">
                    <div class="card-body">
                        <p class="card-text">Ide illessze be a második túra leírását a forras.txt-ből.</p>
                        <a href="#" class="btn btn-primary">Megjelenítés</a>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4 mb-3">
                <div class="card h-100">
                    <img src="kep3.jpg" class="card-img-top" alt="Harmadik kep neve" title="Harmadik kep neve">
                    <div class="card-body">
                        <p class="card-text">Ide illessze be a harmadik túra leírását a forras.txt-ből.</p>
                        <a href="#" class="btn btn-primary">Megjelenítés</a>
